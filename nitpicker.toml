[aggregator]
model = "gemini-3-flash-preview"
provider = "gemini"
auth = "oauth"

[[reviewer]]
name = "gemini"
model = "gemini-3.1-pro-preview"
provider = "gemini"
auth = "oauth"

[[reviewer]]
name = "kimi"
model = "kimi-for-coding"
provider = "anthropic_compatible"
base_url = "https://api.kimi.com/coding/"
api_key_env = "KIMI_API_KEY"

